<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>TorneosPro - Mis Torneos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body class="d-flex flex-column h-100 bg-dark text-light">

<div th:replace="~{fragments/header :: header_fragment}"></div>

<main role="main" class="flex-shrink-0 container py-5">

  <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show rounded-4 mb-4" role="alert">
    <span th:text="${mensaje}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="display-4 fw-bold mb-0">Mis <span class="text-success">Torneos</span></h1>
      <p class="text-secondary mb-0">Listado oficial de los torneos que organizaste.</p>
    </div>

    <div th:if="${not #lists.isEmpty(listaTorneos)}">
      <a th:href="@{/crear-torneo}" class="btn btn-success rounded-pill px-4 fw-bold">
        Nuevo Torneo
      </a>
    </div>
  </div>

  <hr class="border-secondary mb-5">

  <div th:if="${#lists.isEmpty(listaTorneos)}" class="row justify-content-center">
    <div class="col-lg-8 text-center py-5">
      <div class="card bg-dark border border-secondary shadow-lg rounded-4 p-5">
        <h2 class="fw-bold mb-3">No se encontraron torneos</h2>
        <p class="text-secondary mb-4">Aún no registraste ningún torneo bajo tu organización.</p>

        <div>
          <a th:href="@{/crear-torneo}" class="btn btn-outline-success btn-lg rounded-pill px-5">
            Crear el primero
          </a>
        </div>
      </div>
    </div>
  </div>

  <div th:unless="${#lists.isEmpty(listaTorneos)}" class="row g-4">
    <div th:each="torneo : ${listaTorneos}" class="col-md-4">

      <div class="card h-100 bg-dark border border-secondary rounded-4 shadow-sm post-card">
        <div class="card-body p-4 d-flex flex-column justify-content-between">
          <div>
            <div class="d-flex justify-content-between align-items-start mb-3">
              <h3 class="text-success fw-bold mb-0" th:text="${torneo.nombre}">Nombre Torneo</h3>
              <span class="badge bg-secondary" th:text="${torneo.deporte}">Fútbol</span>
            </div>
            <p class="text-secondary small">Sos el organizador y administrador principal de esta competencia.</p>
          </div>

          <div class="mt-4">
            <a th:href="@{/verDetalleTorneo(id=${unTorneo.id})}" class="btn btn-success text-black fw-bold w-100 rounded-pill">
              Gestionar Torneo
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>

</main>
<div th:replace="~{fragments/footer :: footer_fragment}"></div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
