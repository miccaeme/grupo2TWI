<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org" class="h-100"> <!-- 1. Agregamos class="h-100" aquí -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>TorneosPro - Panel Base</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/crear-torneo-style.css}" />
</head>


<body class="d-flex flex-column h-100">


<div th:replace="~{fragments/header :: header_fragment}"></div>

<main role="main" class="container flex-shrink-0 my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card card-dark p-4 shadow-lg rounded-3">

                <div class="mb-4 pb-2 border-bottom border-secondary">
                    <h2 class="fw-bold text-white mb-1" th:text="${torneo.nombre}">Nombre del Torneo</h2>
                    <p class="text-muted small">
                        Formato: <span class="text-success fw-bold" th:text="${torneo.formato}">Liga</span>
                        | Se requieren: <span id="cuposMax" class="text-success fw-bold" th:text="${torneo.cantidadEquipos}"> ??? </span> equipos.
                    </p>
                </div>

                <div class="mb-5 position-relative">
                    <label class="form-label text-success fw-bold small text-uppercase">Buscar Equipo Participante</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fas fa-search"></i></span>
                        <input type="text" id="buscadorEquipo" class="form-control bg-dark text-white border-secondary"
                               placeholder="Escribí el nombre o el ID del equipo previamente creado...">
                    </div>
                    <div id="resultadosBusqueda" class="search-results shadow-lg rounded-bottom"></div>
                </div>



            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer_fragment}"></div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

</body>
</html>
