<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org" class="h-100"> <!-- 1. Agregamos class="h-100" aquí -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>TorneosPro - Panel Base</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <link rel="stylesheet" th:href="@{/css/crear-torneo-style.css}" />
</head>


<body class="d-flex flex-column h-100">
<div th:replace="~{fragments/header :: header_fragment}"></div>


<main role="main" class="container flex-shrink-0 my-5 py-3">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card card-dark shadow-lg rounded-3 p-4 p-md-5">


        <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-secondary">
          <div class="bg-success text-black px-3 py-2 rounded-3 me-3">
            <i class="fas fa-plus-circle fa-2x"></i>
          </div>
          <div>
            <h2 class="fw-bold mb-0 text-white">Crear Nuevo Torneo</h2>
            <p class="text-muted mb-0 small">Completa los datos para abrir las inscripciones de tu torneo.</p>
          </div>
        </div>



        <form th:action="@{/guardarTorneoCreado}" th:object="${torneo}"method="POST">


          <h5 class="text-success text-uppercase fw-semibold mb-3" style="font-size: 0.9rem; letter-spacing: 1px;">
            <i class="fas fa-info-circle me-1"></i> Informacion General
          </h5>

          <div class="row g-3 mb-4">

            <div class="col-12">
              <label for="nombre" class="form-label text-light small fw-medium">Nombre del Torneo *</label>
              <input type="text" th:field="*{nombre}" class="form-control form-control-lg" id="nombre" name="nombre"
                     placeholder="Ej: Copa de Campeones Nocturna" required>
            </div>


            <div class="col-md-6">
              <label for="deporte" class="form-label text-light small fw-medium">Tipo de Deporte / Disciplina *</label>
              <select class="form-select" id="deporte" name="deporte" th:field="*{deporte}" required>
                <option value="" disabled selected>Selecciona un deporte...</option>
                <option value="futbol5">Futbol 5</option>
                <option value="futbol11">Futbol 11</option>
                <option value="basquet">Basquetbol</option>
                <option value="padel">Padel (Dobles)</option>
                <option value="esports">volley</option>
              </select>
            </div>


            <div class="col-md-6">
              <label for="lugar" class="form-label text-light small fw-medium">Lugar / Sede del Evento *</label>
              <input type="text" th:field="*{lugar}" class="form-control" id="lugar" name="lugar"
                     placeholder="Ej: Complejo Deportivo San Martin" required>
            </div>
          </div>


          <h5 class="text-success text-uppercase fw-semibold mb-3" style="font-size: 0.9rem; letter-spacing: 1px;">
            <i class="fas fa-sliders-h me-1"></i> Formato de Competencia
          </h5>

          <div class="row g-3 mb-4">

            <div class="col-md-4">
              <label for="cantidadEquipos" class="form-label text-light small fw-medium">Cantidad de Equipos *</label>
              <select class="form-select" id="cantidadEquipos" name="cantidadEquipos" th:field="*{cantidadEquipos}"required>
                <option value="8">8 Equipos</option>
                <option value="12">12 Equipos</option>
                <option value="16" selected>16 Equipos</option>
                <option value="32">32 Equipos</option>
              </select>
            </div>


            <div class="col-md-4">
              <label for="formato" class="form-label text-light small fw-medium">Formato del Torneo *</label>
              <select class="form-select" id="formato" name="formato" th:field="*{formato}" required>
                <option value="eliminacion_directa">Eliminacion Directa (Playoffs)</option>
                <option value="liga">Liga (Todos contra todos)</option>
                <option value="grupos_playoffs">Fase de Grupos + Eliminatorias</option>
              </select>
            </div>


            <div class="col-md-4">
              <label for="fechaInicio" class="form-label text-light small fw-medium">Fecha estimada de Inicio *</label>
              <input type="date" th:field="*{fechaDeInicio}" class="form-control" id="fechaInicio" name="fechaInicio" required>
            </div>
          </div>

          <div class="row g-3 mb-4">

            <div class="col-md-4">
              <label for="tipoDeTorneo" class="form-label text-light small fw-medium">Tipo de Torneo*</label>
              <select th:field="*{tipoTorneo}" class="form-select" id="tipoDeTorneo" name="tipoDeTorneo" required>
                <option value="1">Publico</option>
                <option value="2">Privado</option>

              </select>
            </div>



          </div>

          <h5 class="text-success text-uppercase fw-semibold mb-3" style="font-size: 0.9rem; letter-spacing: 1px;">
            <i class="fas fa-dollar-sign me-1"></i> Inscripcion y Detalles
          </h5>

          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label for="precio" class="form-label text-light small fw-medium">Costo de Inscripcion por Equipo (ARS)</label>
              <div class="input-group">
                <span class="input-group-text bg-dark border-secondary text-secondary">$</span>
                <input type="number" th:field="*{precio}" class="form-control" id="precio" name="precio" placeholder="0.00 (Dejar gratis si no aplica)">
              </div>
            </div>

            <!-- Descripción / Reglamento Corto (Agregado) -->
            <div class="col-12">
              <label for="descripcion" class="form-label text-light small fw-medium">Reglas aclaratorias o Descripcion</label>
              <textarea th:field="*{descripcion}" class="form-control" id="descripcion" name="descripcion" rows="3"
                        placeholder="Escribi aca las reglas principales, premios o aclaraciones de vestimenta..."></textarea>
            </div>
          </div>

          <!-- BOTONES DE ACCIÓN -->
          <div class="d-flex justify-content-end gap-3 border-top border-secondary pt-4 mt-4">
            <a href="/dashboard" class="btn btn-outline-secondary px-4 py-2 text-white border-secondary fw-medium">
              Cancelar
            </a>
            <button type="submit" class="btn btn-success text-black px-5 py-2 fw-bold shadow-sm">
              <i class="fas fa-save me-2"></i> Crear Torneo
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>
</main>

<!-- Footer Reutilizable -->
<div th:replace="~{fragments/footer :: footer_fragment}"></div>

<!-- Bootstrap core js -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

</body>
</html>
