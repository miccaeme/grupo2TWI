<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>TorneosPro - Detalle del Partido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/fixture.css}">
</head>
<body class="d-flex flex-column h-100 bg-dark text-white">

<div th:replace="~{fragments/header :: header_fragment}"></div>

<main role="main" class="container flex-shrink-0 my-5 py-3">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="d-flex justify-content-center gap-2 mb-3">
                <form th:if="${partido.estado == null or partido.estado.name() == 'PROGRAMADO'}" th:action="@{/partido/iniciar}" method="POST">
                    <input type="hidden" name="id" th:value="${partido.id}">
                    <button type="submit" class="btn btn-sm btn-success px-4 rounded-pill fw-bold">
                        <i class="fas fa-play me-1"></i> Iniciar Partido
                    </button>
                </form>

                <div th:if="${partido.estado != null and partido.estado.name() == 'EN_VIVO'}" class="d-flex gap-2">
                    <a th:href="@{/partido/gestionar(idPartido=${partido.id})}" class="btn btn-sm btn-outline-success px-3 rounded-pill fw-bold d-inline-flex align-items-center">
                        <i class="fas fa-plus me-1"></i> Registrar Incidencia
                    </a>

                    <form th:action="@{/partido/finalizar}" method="POST">
                        <input type="hidden" name="id" th:value="${partido.id}">
                        <button type="submit" class="btn btn-sm btn-danger px-4 rounded-pill fw-bold">
                            <i class="fas fa-stop me-1"></i> Finalizar Partido
                        </button>
                    </form>
                </div>
            </div>

            <div class="card border-secondary shadow-lg rounded-3 mb-4" style="background-color: #1a1a1a;">
                <div class="card-body p-4">

                    <div class="text-center mb-2">
                        <span class="text-success fw-bold text-uppercase tracking-wider small font-monospace">
                            <i class="far fa-calendar-alt me-1"></i> Fecha <span th:text="${partido.nroFecha}">1</span>
                        </span>
                    </div>

                    <div class="text-center mb-2" id="contenedor-cronometro" style="display: none;"
                         th:data-estado="${partido.estado != null ? partido.estado.name() : 'PROGRAMADO'}"
                         th:data-id="${partido.id}">
                        <span class="cronometro-vivo fw-bold">
                            <i class="fas fa-circle me-1 small pulse-live"></i> <span id="tiempo-reloj">00:00</span>
                        </span>
                    </div>

                    <div class="row align-items-center justify-content-center my-3 g-3 g-md-0">
                        <div class="col-12 col-md-5 text-center text-md-end pe-md-4">
                            <h2 class="fw-bold mb-0 text-white tracking-wide"
                                th:text="${partido.equipoLocal != null ? partido.equipoLocal.nombre : 'Libre'}">ARGENTINA</h2>
                        </div>

                        <div class="col-12 col-md-2 text-center d-flex justify-content-center my-2 my-md-0">
                            <div class="d-flex align-items-center justify-content-center bg-dark border border-secondary rounded px-3 py-2 shadow-sm"
                                 style="min-width: 110px; max-width: 130px; letter-spacing: 2px;">
                                <h2 class="fw-bold mb-0 text-success" th:text="${partido.golesLocal != null ? partido.golesLocal : 0}">0</h2>
                                <h2 class="fw-bold mb-0 text-muted mx-2">-</h2>
                                <h2 class="fw-bold mb-0 text-success" th:text="${partido.golesVisitante != null ? partido.golesVisitante : 0}">0</h2>
                            </div>
                        </div>

                        <div class="col-12 col-md-5 text-center text-md-start ps-md-4">
                            <h2 class="fw-bold mb-0 text-white tracking-wide"
                                th:text="${partido.equipoVisitante != null ? partido.equipoVisitante.nombre : 'Libre'}">FRANCIA</h2>
                        </div>
                    </div>

                    <div class="text-center mt-3 pt-2">
                        <span id="estado-partido-badge"
                              th:classappend="${partido.estado != null and partido.estado.name() == 'EN_VIVO' ? 'bg-danger text-white' : 'bg-secondary text-white'}"
                              class="badge text-uppercase px-3 py-2 font-monospace border border-light border-opacity-25 shadow-sm"
                              style="font-size: 0.75rem; letter-spacing: 1px;"
                              th:text="${partido.estado != null ? partido.estado.name() : 'PROGRAMADO'}">
                            PROGRAMADO
                        </span>
                    </div>

                </div>
            </div>

            <div class="card border-secondary shadow-lg rounded-3" style="background-color: #1a1a1a;">
                <div class="card-header border-secondary p-3" style="background-color: #111;">
                    <h3 class="h6 mb-0 text-uppercase fw-bold text-white small">
                        <i class="fas fa-bars-staggered text-success me-2"></i> Estadísticas e Incidencias del Partido
                    </h3>
                </div>
                <div class="card-body p-4">
                    <div th:if="${#lists.isEmpty(estadisticas)}" class="text-center text-muted py-4">
                        <i class="far fa-clock fa-3x mb-3 opacity-50"></i>
                        <p class="mb-0 small">Los eventos y jugadas del partido aparecerán cronológicamente en esta sección.</p>
                    </div>

                    <div th:if="${not #lists.isEmpty(estadisticas)}" class="list-group list-group-flush">
                        <div th:each="est : ${estadisticas}" class="list-group-item bg-transparent text-white border-secondary d-flex align-items-center justify-content-between py-3 px-1">
                            <div class="d-flex align-items-center gap-3">
                                <span th:if="${est.tipo.name() == 'GOL'}" class="fs-4">⚽</span>
                                <span th:if="${est.tipo.name() == 'ASISTENCIA'}" class="fs-4">👟</span>
                                <span th:if="${est.tipo.name() == 'FALTA'}" class="fs-4">⚠️</span>
                                <span th:if="${est.tipo.name() == 'TARJETA_AMARILLA'}" class="fs-4">🟨</span>
                                <span th:if="${est.tipo.name() == 'TARJETA_ROJA'}" class="fs-4">🟥</span>
                                <span th:if="${est.tipo.name() == 'ATAJADA'}" class="fs-4">🧤</span>

                                <div>
                                    <span class="fw-bold text-success" th:text="${est.jugador != null ? (est.jugador.nickname != null ? est.jugador.nickname : est.jugador.nombre) : 'Jugador'}">Jugador</span>
                                    <span class="text-muted mx-1">—</span>
                                    <span class="text-uppercase small font-monospace text-light tracking-wide" th:text="${est.tipo.name()}">INCIDENCIA</span>
                                </div>
                            </div>
                            <span class="badge bg-dark border border-secondary text-muted font-monospace py-2 px-3">
                                <span th:if="${est.tiempo != null}" th:text="|${est.tiempo}'|">0'</span>
                                <span th:unless="${est.tiempo != null}">0'</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/fixture(idTorneo=${partido.torneo != null ? partido.torneo.id : ''})}"
                   class="btn btn-sm btn-outline-secondary text-white border-secondary px-4 rounded-pill">
                    <i class="fas fa-arrow-left me-1"></i> Volver al Fixture
                </a>
            </div>

        </div>
    </div>
</main>

<div class="modal fade" id="modalIncidencia" tabindex="-1" aria-labelledby="modalIncidenciaLabel" aria-hidden="true"
     th:classappend="${param.idPartido != null} ? 'show' : ''"
     th:style="${param.idPartido != null} ? 'display: block;' : ''">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-secondary">
            <div class="modal-header border-secondary" style="background-color: #111;">
                <h5 class="modal-title h6 text-uppercase fw-bold text-success" id="modalIncidenciaLabel">
                    <i class="fas fa-clipboard-list me-2"></i>Nueva Incidencia
                </h5>
                <a th:href="@{/partido/detalle(id=${partido.id})}" class="btn-close btn-close-white"></a>
            </div>

            <form th:action="@{/partido/registrar-incidencia}" method="POST" id="formIncidencia">
                <div class="modal-body p-4">
                    <input type="hidden" name="idPartido" th:value="${partido.id}">

                    <input type="hidden" name="minuto" id="inputMinutoIncidencia" th:value="${param.minuto != null ? param.minuto : 0}">

                    <div class="mb-3">
                        <label class="form-label small text-muted text-uppercase fw-bold">Equipo involucrado</label>
                        <select class="form-select border-secondary text-white shadow-none" id="selectEquipo" name="bando" style="background-color: #212529;"
                                onchange="
                                    let textoReloj = document.getElementById('tiempo-reloj').innerText;
                                    let min = parseInt(textoReloj.split(':')[0]) || 0;
                                    let f = document.getElementById('formIncidencia');
                                    f.method = 'GET';
                                    f.action = '/spring/partido/gestionar';

                                    let inputMin = document.getElementById('inputMinutoIncidencia');
                                    inputMin.value = min;

                                    f.submit();
                                " required>
                            <option value="" disabled th:selected="${bandoSeleccionado == null}" hidden style="background-color: #212529; color: #6c757d;">🔍 Seleccione un equipo...</option>
                            <option value="LOCAL" style="background-color: #212529; color: white;" th:selected="${bandoSeleccionado == 'LOCAL'}" th:text="${partido.equipoLocal != null ? partido.equipoLocal.nombre : 'Local'}">Local</option>
                            <option value="VISITANTE" style="background-color: #212529; color: white;" th:selected="${bandoSeleccionado == 'VISITANTE'}" th:text="${partido.equipoVisitante != null ? partido.equipoVisitante.nombre : 'Visitante'}">Visitante</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-muted text-uppercase fw-bold">Jugador</label>
                        <select class="form-select border-secondary text-white shadow-none" id="selectJugador" name="idJugador" style="background-color: #212529;" th:disabled="${#lists.isEmpty(jugadores)}" required>
                            <option value="" style="background-color: #212529; color: #6c757d;" th:if="${#lists.isEmpty(jugadores)}">Primero seleccione un equipo...</option>
                            <option value="" style="background-color: #212529; color: #6c757d;" th:if="${not #lists.isEmpty(jugadores)}">🔍 Seleccione un jugador...</option>
                            <option th:each="jugador : ${jugadores}"
                                    th:value="${jugador.id}"
                                    th:text="${jugador.nombre}"
                                    style="background-color: #212529; color: white;"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-muted text-uppercase fw-bold">Tipo de Incidencia</label>
                        <select class="form-select border-secondary text-white shadow-none" name="tipoIncidencia" style="background-color: #212529;" required>
                            <option value="" disabled selected hidden style="background-color: #212529; color: #6c757d;">Seleccione una incidencia...</option>
                            <option value="GOL" style="background-color: #212529; color: white;">⚽ Gol</option>
                            <option value="ASISTENCIA" style="background-color: #212529; color: white;">👟 Asistencia</option>
                            <option value="FALTA" style="background-color: #212529; color: white;">⚠️ Falta cometida</option>
                            <option value="TARJETA_AMARILLA" style="background-color: #212529; color: white;">🟨 Tarjeta Amarilla</option>
                            <option value="TARJETA_ROJA" style="background-color: #212529; color: white;">🟥 Tarjeta Roja</option>
                            <option value="ATAJADA" style="background-color: #212529; color: white;">🧤 Atajada</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer border-secondary" style="background-color: #111;">
                    <a th:href="@{/partido/detalle(id=${partido.id})}" class="btn btn-outline-secondary btn-sm px-3 rounded-pill text-white border-secondary">Cancelar</a>

                    <button type="submit" class="btn btn-sm btn-success rounded-pill px-4 fw-bold" th:disabled="${#lists.isEmpty(jugadores)}"
                            onclick="
                                let textoReloj = document.getElementById('tiempo-reloj').innerText;
                                let min = parseInt(textoReloj.split(':')[0]) || 0;
                                document.getElementById('inputMinutoIncidencia').value = min;
                            ">
                        Guardar Incidencia
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal-backdrop fade show" th:if="${param.idPartido != null}"></div>

<div th:replace="~{fragments/footer :: footer_fragment}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

<script th:src="@{/js/cronometro.js}"></script>
</body>
</html>
