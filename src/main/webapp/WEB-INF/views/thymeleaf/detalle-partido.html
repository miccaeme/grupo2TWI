<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>TorneosPro - Detalle del Partido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="d-flex flex-column h-100 bg-dark text-white">

<div th:replace="~{fragments/header :: header_fragment}"></div>

<main role="main" class="container flex-shrink-0 my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card p-4 text-center shadow-lg mb-4" style="background-color: #1a1a1a; border: 1px solid #2b3035;">
                <h6 class="text-success text-uppercase small fw-bold" th:text="'Fecha ' + ${partido.nroFecha}">FECHA 1</h6>

                <div class="d-flex align-items-center justify-content-center my-4">
                    <div class="flex-grow-1 text-end px-3">
                        <h3 class="fw-bold mb-0" th:text="${partido.equipoLocal.nombre}">ARGENTINA</h3>
                    </div>

                    <div class="d-flex align-items-center bg-dark border border-secondary rounded p-3">
                        <h2 class="fw-bold mb-0 px-3 text-success" th:text="${partido.golesLocal != null ? partido.golesLocal : 0}">0</h2>
                        <span class="text-muted px-2">-</span>
                        <h2 class="fw-bold mb-0 px-3 text-success" th:text="${partido.golesVisitante != null ? partido.golesVisitante : 0}">0</h2>
                    </div>

                    <div class="flex-grow-1 text-start px-3">
                        <h3 class="fw-bold mb-0" th:text="${partido.equipoVisitante.nombre}">FRANCIA</h3>
                    </div>
                </div>

                <span class="badge bg-secondary align-self-center rounded-pillpx-3" th:text="${partido.estado}">PROGRAMADO</span>
            </div>

            <div class="card p-4 shadow-lg" style="background-color: #1a1a1a; border: 1px solid #2b3035;">
                <h5 class="border-bottom border-secondary pb-2 mb-3 text-uppercase small fw-bold text-muted">
                    <i class="fas fa-chart-bar me-2 text-success"></i> Estadísticas e Incidencias
                </h5>

                <div th:if="${#lists.isEmpty(partidomuestras)}" class="text-center py-4 text-muted">
                    <i class="far fa-clock fa-2x mb-2"></i>
                    <p class="small mb-0">No se registraron goles ni tarjetas en este partido todavía.</p>
                </div>

            </div>

            <div class="mt-4 text-center">
                <a th:href="@{/fixture(idTorneo=${partido.torneo.id})}" class="btn btn-outline-secondary rounded-pill btn-sm px-4">
                    <i class="fas fa-arrow-left me-1"></i> Volver al Fixture
                </a>
            </div>

        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer_fragment}"></div>
</body>
</html>
