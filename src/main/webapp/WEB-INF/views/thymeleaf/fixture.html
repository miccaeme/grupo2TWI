<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>TorneosPro - Fixture del Torneo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/fixture.css}">
</head>

<body class="d-flex flex-column h-100 bg-dark">

<div th:replace="~{fragments/header :: header_fragment}"></div>

<main role="main" class="container flex-shrink-0 my-5 py-3">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom border-secondary">
                <div>
                    <h2 class="fw-bold text-white mb-1">
                        <i class="fas fa-calendar-alt text-success me-2"></i>Fixture del Torneo
                    </h2>
                </div>
                <a th:href="@{/verTorneosCreados}" class="btn btn-outline-secondary text-white border-secondary btn-sm px-3 rounded-pill">
                    <i class="fas fa-arrow-left me-1"></i> Volver a Torneos
                </a>
            </div>

            <div th:if="${#lists.isEmpty(partidos)}" class="alert alert-dark border-secondary text-center py-5 shadow-sm" style="background-color: #1a1a1a;">
                <i class="fas fa-exclamation-triangle fa-3x text-muted mb-3"></i>
                <h4 class="text-white">¡Aún no se han generado partidos para este torneo!</h4>
                <p class="text-muted small">Asegúrate de asignar los equipos correctamente para calcular el fixture.</p>
                <a th:href="@{/verTorneosCreados}" class="btn btn-outline-success btn-sm mt-2">Ir a Torneos</a>
            </div>

            <div th:if="${!#lists.isEmpty(partidos)}">
                <div class="card card-jornada shadow-lg border-secondary rounded-3" style="background-color: #1a1a1a;">

                    <div class="header-jornada d-flex justify-content-between align-items-center border-bottom border-secondary p-3" style="background-color: #111;">
                        <h3 class="h5 mb-0 text-uppercase fw-bold text-white small">
                            <i class="fas fa-trophy text-success me-2"></i> Calendario de Encuentros
                        </h3>
                        <span class="badge" style="background-color: #2b3035; border: 1px solid #495057; color: white;" th:text="${partidos.size()} + ' partidos totales'">0 Partidos</span>
                    </div>

                    <div class="card-body p-3">
                        <div th:each="partido, i : ${partidos}">

                            <div th:if="${i.first or partidos[i.index - 1].nroFecha != partido.nroFecha}"
                                 class="p-2 mb-2 mt-3 rounded-2 text-success fw-bold text-uppercase small d-flex justify-content-between border-start border-success border-3"
                                 style="background-color: #161b22; letter-spacing: 0.5px;">
                                <span>
                                    <i class="far fa-calendar-check me-2"></i>Fecha <span th:text="${partido.nroFecha}">1</span>
                                </span>
                                <span class="text-muted text-lowercase font-monospace small"
                                      th:text="${partido.fecha != null ? partido.fecha : 'Fecha a confirmar'}" style="font-size: 0.8rem;">01/10/2026</span>
                            </div>

                            <div class="partido-row d-flex align-items-center justify-content-between border border-secondary rounded-3 p-3 mb-2"
                                 style="background-color: #24292d;">

                                <div class="row flex-grow-1 align-items-center text-center px-4">
                                    <div class="col-5 text-end">
                                        <span class="nombre-equipo text-white fw-bold" th:text="${partido.equipoLocal != null ? partido.equipoLocal.nombre : 'Libre'}">Equipo Local</span>
                                    </div>

                                    <div class="col-2">
                                        <span class="vs-badge">VS</span>
                                    </div>

                                    <div class="col-5 text-start">
                                        <span class="nombre-equipo text-white fw-bold" th:text="${partido.equipoVisitante != null ? partido.equipoVisitante.nombre : 'Libre'}">Equipo Visitante</span>
                                    </div>
                                </div>

                                <div class="pe-2 text-end" style="min-width: 120px;">
                                    <a th:href="@{/partido/detalle(id=${partido.id})}" class="btn btn-sm btn-outline-success px-3 rounded-pill" style="font-size: 0.75rem;">
                                        <span th:if="${partido.estado != null and partido.estado.name() == 'FINALIZADO'}">Ver Detalle</span>
                                        <span th:if="${partido.estado != null and partido.estado.name() == 'EN_VIVO'}" class="text-danger fw-bold">En Vivo</span>
                                        <span th:if="${partido.estado == null or partido.estado.name() == 'PROGRAMADO'}">Gestionar</span>
                                    </a>
                                </div>

                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer_fragment}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>
</html>
