<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crear jugador</title>
  <link
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom">

  <div class="container">

    <a class="navbar-brand logo" href="#">

      <span class="logo-verde"></span>

      TORNEOS

      <span class="logo-verde">PRO</span>

    </a>

  </div>

</nav>

<main class="container py-5">

  <div class="row justify-content-center">

    <div class="col-md-7 col-lg-6">

      <div class="card border-0 shadow-lg rounded-4 card-custom">

        <div class="card-body p-5">

          <h1 class="text-center titulo-verde mb-2">
            Crear jugador
          </h1>

          <p class="text-center text-secondary mb-4">
            Registrá un jugador para participar en torneos deportivos.
          </p>

          <div
                  th:if="${mensaje}"
                  class="alert alert-success"
                  th:text="${mensaje}">
          </div>

          <form
                  th:action="@{/jugador/crear}"
                  th:object="${jugador}"
                  method="post">

            <div class="mb-3">

              <label class="form-label">
                Nombre
              </label>

              <input
                      type="text"
                      th:field="*{nombre}"
                      class="form-control"
                      required>

            </div>

            <div class="mb-3">

              <label class="form-label">
                Apellido
              </label>

              <input
                      type="text"
                      th:field="*{apellido}"
                      class="form-control"
                      required>

            </div>

            <div class="mb-3">

              <label class="form-label">
                Email
              </label>

              <input
                      type="email"
                      th:field="*{email}"
                      class="form-control"
                      required>

            </div>

            <div class="mb-3">

              <label class="form-label">
                DNI
              </label>

              <input
                      type="number"
                      th:field="*{dni}"
                      class="form-control"
                      required>

            </div>

            <div class="mb-3">

              <label class="form-label">
                Deporte
              </label>

              <select
                      th:field="*{deporte}"
                      id="deporte"
                      class="form-select"
                      required>

                <option value="">
                  Seleccione un deporte
                </option>

                <option
                        th:each="deporte : ${deportes}"
                        th:value="${deporte}"
                        th:text="${deporte}">
                </option>

              </select>

            </div>

            <div class="mb-4">

              <label class="form-label">
                Posición
              </label>

              <select
                      th:field="*{posicion}"
                      id="posicion"
                      class="form-select"
                      required>

                <option value="">
                  Seleccione una posición
                </option>

              </select>

            </div>

            <button
                    type="submit"
                    class="btn w-100 fw-bold rounded-pill boton-verde">

              Crear jugador

            </button>

          </form>

        </div>

      </div>

    </div>

  </div>

</main>

<script th:src="@{/js/jugador.js}"></script>

</body>
