<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>TorneosPro - Panel Base</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/crear-torneo-style.css}" />
    <style>
        /* Obligamos a que el contenedor de resultados tenga fondo y se note */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #111417 !important; /* Gris ultra oscuro tirando a negro */
            border: 1px solid #198754 !important; /* Borde verde para que combine con tus labels */
            z-index: 9999 !important; /* Máxima prioridad para que flote encima de todo */
            max-height: 200px;
            overflow-y: auto;
        }

        /* Estilo para cada fila de equipo sugerido */
        .search-result-item {
            padding: 10px;
            color: #ffffff !important;
            background-color: #1a1d20;
            border-bottom: 1px solid #2d3238;
        }

        /* El efecto cuando pasás el mouse por arriba */
        .search-result-item:hover {
            background-color: #198754 !important; /* Cambia a verde */
            color: #000000 !important; /* Texto negro para que contraste impecable */
            font-weight: bold;
        }
    </style>
</head>
<body class="d-flex flex-column h-100">


<div th:replace="~{fragments/header :: header_fragment}"></div>

<main role="main" class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card card-dark p-4 shadow-lg rounded-3 bg-dark text-white">

                <div class="mb-4 pb-2 border-bottom border-secondary">
                    <h2 class="fw-bold text-white mb-1" th:text="${torneo.nombre}">Nombre del Torneo</h2>
                    <p class="text-muted small">
                        Formato: <span class="text-success fw-bold" th:text="${torneo.formato}">Liga</span>
                        | Se requieren: <span class="text-success fw-bold" th:text="${torneo.cantidadEquipos}">0</span> equipos.
                    </p>
                </div>

                <form th:action="@{/guardarEquiposAsignados}" method="POST">
                    <input type="hidden" name="id" th:value="${torneo.id}" />

                    <h5 class="text-success small fw-bold mb-3 text-uppercase">Slots de Inscripción del Torneo</h5>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6" th:each="i, stat : ${#numbers.sequence(1, torneo.cantidadEquipos)}">
                            <div class="p-3 border border-secondary rounded bg-secondary bg-opacity-10">
                                <label class="text-muted d-block small mb-2" th:text="'Slot #' + ${i}">Slot #1</label>

                                <div th:if="${torneo.equipos != null and stat.index < torneo.equipos.size()}">
                                    <span class="fw-bold text-success" th:text="${torneo.equipos[stat.index].nombre}">Equipo Confirmado</span>
                                    <span class="text-muted small d-block mt-1"><i class="fas fa-lock me-1"></i> Inscripcion Confirmada</span>

                                    <input type="hidden" name="equiposIds" th:value="${torneo.equipos[stat.index].id}" />
                                </div>

                                <div th:unless="${torneo.equipos != null and stat.index < torneo.equipos.size()}">
                                    <select class="form-select bg-dark text-white border-secondary btn-sm" name="equiposIds">
                                        <option value="" selected>-- Seleccionar Equipo --</option>
                                        <option th:each="equipo : ${todosLosEquipos}"
                                                th:value="${equipo.id}"
                                                th:text="${equipo.nombre}">Nombre del Equipo</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 border-top border-secondary pt-3 mt-4">
                        <a th:href="@{/verTorneosCreados}" class="btn btn-outline-secondary text-white border-secondary btn-sm">Volver</a>
                        <button type="submit" class="btn btn-success btn-sm text-black fw-bold px-4">
                            <i class="fas fa-check-circle me-1"></i> Confirmar Inscripciones
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer_fragment}"></div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

</body>
</html>
