<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>TorneosPro - Asignar Equipos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/crear-torneo-style.css}" />
    <link rel="stylesheet" th:href="@{/css/asignar-equipos.css}" />
</head>
<body class="d-flex flex-column h-100 bg-dark">

<div th:replace="~{fragments/header :: header_fragment}"></div>

<main role="main" class="container flex-shrink-0 my-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card card-dark p-4 shadow-lg rounded-3 border-secondary text-white" style="background-color: #1a1a1a;">

                <div class="mb-4 pb-2 border-bottom border-secondary">
                    <h2 class="fw-bold text-white mb-1" th:text="${torneo.nombre}">Nombre del Torneo</h2>
                    <p class="text-muted small">
                        Formato: <span class="text-success fw-bold" th:text="${torneo.formato}">Liga</span>
                        | Se requieren: <span class="text-success fw-bold" th:text="${torneo.cantidadEquipos}">0</span> equipos.
                    </p>
                </div>

                <form th:action="@{/guardarEquiposAsignados}" method="POST">
                    <input type="hidden" name="id" th:value="${torneo.id}" />

                    <h5 class="text-success small fw-bold mb-3 text-uppercase">Slots de Inscripción del Torneo</h5>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6" th:each="e, i : ${#numbers.sequence(1, torneo.cantidadEquipos)}">
                            <div class="p-3 border border-secondary rounded" style="background-color: #24292d;">
                                <label class="text-muted d-block small mb-2" th:text="'Slot #' + ${e}">Slot #1</label>

                                <div th:if="${relacionesExistentes != null and i.index < relacionesExistentes.size()}">
                                    <span class="fw-bold text-success" th:text="${relacionesExistentes[i.index].equipo.nombre}">Equipo Confirmado</span>
                                    <span class="text-secondary small d-block mt-1">
                                        <i class="fas fa-lock me-1"></i> Inscripción Confirmada
                                    </span>
                                    <input type="hidden" name="equiposIds" th:value="${relacionesExistentes[i.index].equipo.id}" />
                                </div>

                                <div th:unless="${relacionesExistentes != null and i.index < relacionesExistentes.size()}">
                                    <select class="form-select bg-dark text-white border-secondary selector-equipo"
                                            name="equiposIds">
                                        <option th:value="${null}">-- Seleccionar Equipo --</option>

                                        <th:block th:each="equipo : ${todosLosEquipos}">
                                            <option th:if="${relacionesExistentes == null or !#lists.contains(relacionesExistentes.![equipo.id], equipo.id)}"
                                                    th:value="${equipo.id}"
                                                    th:text="${equipo.nombre}">
                                                Nombre del Equipo
                                            </option>
                                        </th:block>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 border-top border-secondary pt-3 mt-4">
                        <a th:href="@{/verTorneosCreados}" class="btn btn-outline-secondary text-white border-secondary btn-sm rounded-pill px-4">Volver</a>

                        <button type="submit"
                                class="btn btn-success btn-sm text-black fw-bold px-4 rounded-pill"
                                th:if="${relacionesExistentes == null or relacionesExistentes.size() < torneo.cantidadEquipos}">
                            <i class="fas fa-check-circle me-1"></i> Confirmar Inscripciones
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer_fragment}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

<script th:src="@{/js/asignarEquipos.js}"></script>

</body>
</html>
