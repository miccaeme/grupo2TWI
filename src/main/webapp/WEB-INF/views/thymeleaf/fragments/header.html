<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<header th:fragment="header_fragment">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/main.css}" />

    <style>
        .nav-perfil-link {
            color: #ffffff;
            transition: color 0.2s ease-in-out;
        }
        .nav-perfil-link:hover {
            color: #198754 !important;
            cursor: pointer;
        }
        /* Clases personalizadas de utilidad para la paleta de colores */
        .hover-success:hover { color: #198754 !important; transition: color 0.2s ease-in-out; }
        .hover-light:hover { color: #f8f9fa !important; }
        .hover-brightness:hover { filter: brightness(1.1); }
        .text-secondary { color: #adb5bd !important; }
    </style>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black py-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold text-uppercase" th:href="@{/home}" style="letter-spacing: 1px;">
                <span class="bg-success text-black px-2 py-1 rounded me-2 d-inline-block">
                    <i class="alt"></i>
                </span>
                <span class="text-white">Torneos</span><span class="text-success">Pro</span>
            </a>

            <button class="navbar-toggler border-secondary text-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link active hover-success" th:href="@{/home}">Inicio</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle hover-success" href="#" id="navbarDropdownTorneos" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Torneos
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark border-secondary shadow-lg" aria-labelledby="navbarDropdownTorneos">
                            <li><a class="dropdown-item py-2" th:href="@{/verTorneosCreados}"><i class="me-2 text-success"></i> Buscar torneos</a></li>
                            <li><a class="dropdown-item py-2" th:href="@{/crear-torneo}"><i class="me-2 text-success"></i> Crear torneo</a></li>
                            <li><hr class="dropdown-divider border-secondary"></li>
                            <li><a class="dropdown-item py-2" href="mis-torneos.html"><i class="me-2 text-success"></i> Mis torneos</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle hover-success" href="#" id="navbarDropdownEquipos" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Equipos
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark border-secondary shadow-lg" aria-labelledby="navbarDropdownTorneos">
                            <li><a class="dropdown-item py-2" th:href="@{/verEquiposCreados}"><i class="me-2 text-success"></i> Buscar equipos</a></li>
                            <li><a class="dropdown-item py-2" th:href="@{/equipo/crear}" ><i class="me-2 text-success"></i> Crear equipo </a></li>
                            <li><hr class="dropdown-divider border-secondary"></li>
                            <li><a class="dropdown-item py-2" th:href="@{/equipo/mis-equipos}"><i class="me-2 text-success"></i> Mis equipos</a></li>
                        </ul>
                    </li>

                </ul>

                <div class="d-flex align-items-center gap-4 border-secondary pt-3 pt-lg-0 border-lg-0 mt-3 mt-lg-0">
                    <div class="dropdown position-relative header-bell">

                        <a href="#" class="text-secondary text-decoration-none d-inline-flex align-items-center dropdown-toggle"
                           id="dropdownBell" data-bs-toggle="dropdown" aria-expanded="false" style="all: unset; cursor: pointer;">
                            <i class="bi bi-bell-fill text-success fs-5"></i>

                            <span th:if="${cantNotificacionesNoLeidas != null && cantNotificacionesNoLeidas > 0}"
                                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger fw-bold text-white shadow"
                                  style="font-size: 0.65rem; padding: 0.25em 0.5em;"
                                  th:text="${cantNotificacionesNoLeidas}">
            </span>
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark border-secondary shadow-lg py-2 mt-2"
                            aria-labelledby="dropdownBell" style="min-width: 300px; max-width: 340px; max-height: 400px; overflow-y: auto; z-index: 1050;">

                            <li class="px-3 py-2 border-bottom border-secondary d-flex justify-content-between align-items-center">
                                <span class="fw-bold text-success small text-uppercase" style="letter-spacing: 0.5px;">Notificaciones</span>
                                <span th:text="${cantNotificacionesNoLeidas != null ? cantNotificacionesNoLeidas : 0} + ' nuevas'"
                                      class="badge bg-secondary text-white" style="font-size: 0.7rem;">0 nuevas</span>
                            </li>

                            <li th:if="${notificaciones == null || notificaciones.isEmpty()}">
                                <div class="dropdown-item py-4 text-center text-secondary small">
                                    <i class="bi bi-bell-slash fs-5 d-block mb-2 text-muted"></i>
                                    No tenés notificaciones pendientes.
                                </div>
                            </li>

                            <th:block th:if="${notificaciones != null && !notificaciones.isEmpty()}">
                                <li th:each="noti : ${notificaciones}"
                                    class="border-bottom border-secondary border-opacity-20 d-flex align-items-center justify-content-between px-3 py-2"
                                    th:style="${noti.leida == null || !noti.leida} ? 'background-color: rgba(25, 135, 84, 0.05);' : ''">

                                    <div class="text-wrap small text-light me-2" style="white-space: normal; flex: 1;">
                                        <i class="bi bi-info-circle text-success me-1"></i>
                                        <span th:text="${noti.mensaje}" th:classappend="${noti.leida} ? 'text-muted text-decoration-line-through' : ''">¡Mensaje!</span>
                                    </div>

                                    <form th:if="${noti.leida == null || !noti.leida}" th:action="@{/notificacion/leer}" method="post" class="m-0">
                                        <input type="hidden" name="id" th:value="${noti.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-success border-0 rounded-circle p-1 lh-1" title="Marcar como leída">
                                            <i class="bi bi-check2 fs-6 fw-bold"></i>
                                        </button>
                                    </form>
                                </li>
                            </th:block>

                            <li class="text-center pt-2">
                                <a th:href="@{/notificaciones}" class="text-success small fw-semibold text-decoration-none d-block py-1">
                                    Ver todo el historial
                                </a>
                            </li>
                        </ul>
                    </div>

                    <div>
                        <a th:href="@{/perfil}" class="text-secondary text-decoration-none fw-semibold d-inline-flex align-items-center gap-2 nav-perfil-link hover-success">
                            <i class="bi bi-person-circle text-success fs-5"></i>
                            <span th:text="${#session.getAttribute('usuarioNick')}">Mi Perfil</span>
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </nav>


</header>

</body>
</html>
