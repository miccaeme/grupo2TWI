<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
<header th:fragment="header_fragment" class="bg-dark text-white shadow-sm border-bottom border-secondary">
    <div class="container-fluid bg-black py-1 px-4 d-flex justify-content-between align-items-center d-none d-md-flex" style="font-size: 0.85rem;">
        <span class="text-secondary">
            <i class="fas fa-trophy text-success me-1"></i> Plataforma de Gestion de Torneos v1.0
        </span>
        <div class="text-secondary">
            <span class="me-3"><i class="fas fa-calendar-alt text-success me-1"></i> Temporada 2026</span>

        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold text-uppercase" th:href="@{/home}" style="letter-spacing: 1px;">
                <span class="bg-success text-black px-2 py-1 rounded me-2 d-inline-block">
                    <i class="fas fa-shield-alt"></i>
                </span>
                <span class="text-white">Torneos</span><span class="text-success">Pro</span>

            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link active hover-success" th:href="@{home}">Inicio</a>
                    </li>
                    <!-- <li class="nav-item">
                        <a class="nav-link hover-success" href="torneos.html">Torneos</a>
                    </li> -->

                    <li class="nav-item dropdown">
                        <!-- El enlace principal que activa el menú -->
                        <a class="nav-link dropdown-toggle hover-success"
                           href="#"
                           id="navbarDropdownTorneos"
                           role="button"
                           data-bs-toggle="dropdown"
                           aria-expanded="false">
                            Torneos
                        </a>

                        <!-- El menú desplegable -->
                        <ul class="dropdown-menu dropdown-menu-dark border-secondary shadow-lg" aria-labelledby="navbarDropdownTorneos">
                            <li>
                                <a class="dropdown-item py-2" th:href="@{verTorneosCreados}">
                                    <i class="fas fa-trophy me-2 text-success"></i> Ver torneos
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item py-2" th:href="@{crear-torneo}">
                                    <i class="fas fa-plus-circle me-2 text-success"></i> Crear torneo
                                </a>
                            </li>
                            <li><hr class="dropdown-divider border-secondary"></li>
                            <li>
                                <a class="dropdown-item py-2" href="mis-torneos.html">
                                    <i class="fas fa-user-shield me-2 text-success"></i> Mis torneos
                                </a>
                            </li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link hover-success" href="equipos.html">Equipos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link hover-success" href="fixture.html">Fixture</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link hover-success" th:href="@{/equipo/crear}">Crear Equipo</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3 border-secondary pt-3 pt-lg-0 border-lg-0 mt-3 mt-lg-0">
                    <a href="buscar.html" class="btn btn-link text-secondary p-0 hover-light d-none d-lg-inline-block" title="Buscar torneos">
                        <i class="fas fa-search fa-lg"></i>
                    </a>

                    <a th:href="@{/jugador/crear}" class="btn btn-success btn-sm px-3 rounded-pill fw-semibold text-black shadow-sm hover-brightness">
                        <i class="fas fa-user-plus me-1"></i>Completar perfil jugador
                    </a>
                </div>
            </div>
        </div>
    </nav>
</header>

<style>
    /* Clases personalizadas de utilidad para la paleta de colores */
    .hover-success:hover { color: #198754 !important; transition: color 0.2s ease-in-out; }
    .hover-light:hover { color: #f8f9fa !important; }
    .hover-brightness:hover { filter: brightness(1.1); }
    .text-secondary { color: #adb5bd !important; }
</style>

</body>
</html>
