<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Gestionar Jugadores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/header :: header_fragment}"></div>

<main role="main" class="container py-5">
  <div class="mb-4">
    <h1 class="display-5 fw-bold mb-0 text-light">
      Gestionar: <span class="text-success" th:text="${equipo.nombre}">Nombre Equipo</span>
    </h1>
    <p class="text-secondary" th:text="'Disciplina: ' + ${equipo.deporte}">Disciplina:</p>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-4 mb-4" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card bg-black border border-secondary rounded-4 p-4 shadow-lg mb-4">
        <h5 class="fw-bold text-light mb-3"><i class="bi bi-person-plus text-success me-2"></i>Inscribir Jugador</h5>
        <p class="text-secondary small">Ingresá el apodo (Nickname) del jugador y asignale un puesto en el plantel.</p>

        <form th:action="@{/equipo/asignar-jugador}" method="POST">
          <input type="hidden" name="equipoId" th:value="${equipo.id}">

          <div class="mb-3">
            <label class="form-label text-secondary small fw-bold">Nickname del Usuario</label>
            <div class="input-group">
              <span class="input-group-text bg-dark border-secondary text-secondary">@</span>
              <input type="text" name="nickname" class="form-control bg-dark text-white border-secondary" placeholder="Ej: mica2026" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label text-secondary small fw-bold">Posición </label>
            <select name="posicion" class="form-select bg-dark text-white border-secondary" required>
              <option value="">Seleccione un puesto</option>
              <option th:each="pos : ${posiciones}"
                      th:value="${pos}"
                      th:text="${pos.name()}">ARQUERO</option>
            </select>
          </div>

          <button type="submit" class="btn btn-success w-100 rounded-pill fw-bold">Agregar al Equipo</button>
        </form>
      </div>

      <div class="card bg-black border border-secondary rounded-4 p-4 shadow-lg">
        <h5 class="fw-bold text-light mb-3"><i class="bi bi-envelope-open text-success me-2"></i>Solicitudes</h5>
        <p class="text-secondary small">Postulaciones de jugadores libres esperando aprobación.</p>
        <div class="text-muted small text-center py-3 border border-dashed border-secondary rounded-3">
          No hay solicitudes pendientes por ahora.
        </div>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card bg-black border border-secondary rounded-4 p-4 shadow-lg">
        <h5 class="fw-bold text-light mb-4"><i class="bi bi-grid-3x3-gap text-success me-2"></i>Distribución del Plantel</h5>

        <div th:if="${equipo.deporte.name() == 'FUTBOL'}" class="cancha rounded-4 p-4 position-relative"
             style="background: linear-gradient(135deg, #11381e 0%, #092413 100%); min-height: 480px; border: 2px solid #206030;">

          <div class="position-absolute top-50 start-50 translate-middle rounded-circle border border-white border-opacity-10" style="width: 120px; height: 120px;"></div>
          <div class="position-absolute top-50 start-0 end-0 border-top border-white border-opacity-10"></div>

          <div class="d-flex flex-column justify-content-between h-100 gap-4 position-relative" style="z-index: 2;">

            <div class="d-flex justify-content-center mt-2">
              <div style="width: 130px;">
                <input th:if="${JUGADOR_DELANTERO_PIVOT != null}" type="text" class="form-control form-control-sm text-center bg-success text-white border-success fw-bold" th:value="'@' + ${JUGADOR_DELANTERO_PIVOT.nickname}" readonly>
                <input th:if="${JUGADOR_DELANTERO_PIVOT == null}" type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" placeholder="PIVOT (Vacante)" readonly>
              </div>
            </div>

            <div class="d-flex justify-content-between px-4">
              <div style="width: 120px;">
                <input th:if="${JUGADOR_LATERAL_IZQUIERDO != null}" type="text" class="form-control form-control-sm text-center bg-success text-white border-success fw-bold" th:value="'@' + ${JUGADOR_LATERAL_IZQUIERDO.nickname}" readonly>
                <input th:if="${JUGADOR_LATERAL_IZQUIERDO == null}" type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" placeholder="LI (Vacante)" readonly>
              </div>
              <div style="width: 120px;">
                <input th:if="${JUGADOR_LATERAL_DERECHO != null}" type="text" class="form-control form-control-sm text-center bg-success text-white border-success fw-bold" th:value="'@' + ${JUGADOR_LATERAL_DERECHO.nickname}" readonly>
                <input th:if="${JUGADOR_LATERAL_DERECHO == null}" type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" placeholder="LD (Vacante)" readonly>
              </div>
            </div>

            <div class="d-flex justify-content-center">
              <div style="width: 130px;">
                <input th:if="${JUGADOR_DEFENSOR_CENTRAL != null}" type="text" class="form-control form-control-sm text-center bg-success text-white border-success fw-bold" th:value="'@' + ${JUGADOR_DEFENSOR_CENTRAL.nickname}" readonly>
                <input th:if="${JUGADOR_DEFENSOR_CENTRAL == null}" type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" placeholder="CENTRAL (Vacante)" readonly>
              </div>
            </div>

            <div class="d-flex justify-content-center mb-2">
              <div style="width: 140px;" class="text-center">
                <input th:if="${JUGADOR_ARQUERO != null}" type="text" class="form-control form-control-sm text-center bg-success text-white border-success fw-bold" th:value="'@' + ${JUGADOR_ARQUERO.nickname}" readonly>
                <input th:if="${JUGADOR_ARQUERO == null && JUGADOR_CAPITAN != null}" type="text" class="form-control form-control-sm text-center bg-success text-white border-success fw-bold" th:value="'👑 @' + ${JUGADOR_CAPITAN.nickname}" readonly>
                <input th:if="${JUGADOR_ARQUERO == null && JUGADOR_CAPITAN == null}" type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" placeholder="ARQ (Vacante)" readonly>
              </div>
            </div>

          </div>
        </div>

        <div th:if="${equipo.deporte.name() == 'BASQUET'}" class="cancha rounded-4 p-4 position-relative"
             style="background: linear-gradient(135deg, #3d1c06 0%, #210e02 100%); min-height: 450px; border: 2px solid #6e330c;">

          <div class="position-absolute top-0 start-50 translate-middle-x border border-white border-opacity-10 rounded-bottom" style="width: 70%; height: 180px;"></div>

          <div class="d-flex flex-column justify-content-between h-100 gap-5">
            <div class="d-flex justify-content-around mt-3">
              <input type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" style="width: 110px;" placeholder="Alero (Vacante)" readonly>
              <input type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" style="width: 110px;" placeholder="Pivot (Vacante)" readonly>
              <input type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" style="width: 110px;" placeholder="Escolta (Vacante)" readonly>
            </div>
            <div class="d-flex justify-content-center gap-5 mb-3">
              <input type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" style="width: 110px;" placeholder="Base (Vacante)" readonly>
              <input type="text" class="form-control form-control-sm text-center bg-success text-white border-success fw-bold" style="width: 110px;" th:value="${equipo.creador.nombre}" readonly>
            </div>
          </div>
        </div>

        <div th:if="${equipo.deporte.name() == 'PADEL'}" class="cancha rounded-4 p-4 position-relative"
             style="background: linear-gradient(135deg, #0f3142 0%, #071924 100%); min-height: 350px; border: 2px solid #1a5370;">

          <div class="position-absolute top-0 bottom-0 start-50 border-start border-white border-opacity-10"></div>

          <div class="d-flex flex-column justify-content-center h-100">
            <div class="d-flex justify-content-center gap-5 my-5">
              <div class="text-center">
                <span class="badge bg-info text-dark mb-1 small">Revés</span>
                <input type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" style="width: 130px;" placeholder="Vacante" readonly>
              </div>
              <div class="text-center">
                <span class="badge bg-success mb-1 small">Drive (Capitán)</span>
                <input type="text" class="form-control form-control-sm text-center bg-success text-white border-success fw-bold" style="width: 130px;" th:value="${equipo.creador.nombre}" readonly>
              </div>
            </div>
          </div>
        </div>

        <div th:if="${equipo.deporte.name() == 'VOLEY'}" class="cancha rounded-4 p-4 position-relative"
             style="background: linear-gradient(135deg, #423b0f 0%, #242007 100%); min-height: 420px; border: 2px solid #70631a;">

          <div class="position-absolute top-0 start-0 end-0 border-bottom border-warning border-opacity-25" style="border-bottom-style: dashed !important;"></div>

          <div class="d-flex flex-column justify-content-between h-100 gap-4 mt-3">
            <div class="d-flex justify-content-around">
              <input type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" style="width: 105px;" placeholder="Punta (Vacante)" readonly>
              <input type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" style="width: 105px;" placeholder="Central (Vacante)" readonly>
              <input type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" style="width: 105px;" placeholder="Armador (Vacante)" readonly>
            </div>
            <div class="d-flex justify-content-around mb-2">
              <input type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" style="width: 105px;" placeholder="Zaguero (Vacante)" readonly>
              <input type="text" class="form-control form-control-sm text-center bg-dark text-white border-secondary" style="width: 105px;" placeholder="Líbero (Vacante)" readonly>
              <input type="text" class="form-control form-control-sm text-center bg-success text-white border-success fw-bold" style="width: 105px;" th:value="${equipo.creador.nombre}" readonly>
            </div>
          </div>
        </div>


      </div>
    </div>
  </div>
</main>


<div th:replace="~{fragments/footer :: footer_fragment}"></div>
<script th:src="@{/js/gestionarEquipo.js}"></script>
</body>
</html>
