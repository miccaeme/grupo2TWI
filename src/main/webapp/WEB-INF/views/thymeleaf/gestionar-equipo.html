<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Jugadores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/header :: header_fragment}"></div>

<main class="container py-5">

  <div class="row justify-content-center">

    <div class="col-lg-8">

      <!-- INFO EQUIPO -->
      <div class="card border-0 shadow-lg rounded-4 card-custom mb-4">

        <div class="card-body p-5 text-center">

          <h1 class="titulo-verde mb-2">
            Gestionar equipo
          </h1>

          <p class="text-secondary mb-1">
            Equipo:
            <span class="fw-bold" th:text="${equipo.nombre}">
                            Los Salchichas
                        </span>
          </p>

          <p class="text-secondary">
            Deporte:
            <span class="fw-bold" th:text="${equipo.deporte}">
                            FUTBOL
                        </span>
          </p>

        </div>

      </div>

      <!-- JUGADORES ACTUALES -->
      <div class="card border-0 shadow-lg rounded-4 card-custom mb-4">

        <div class="card-body p-5">

          <h3 class="titulo-verde mb-4">
            Jugadores actuales
          </h3>

          <div class="table-responsive">

            <table class="table table-dark table-hover align-middle rounded-4 overflow-hidden">

              <thead>

              <tr>
                <th>Jugador</th>
                <th>Posición</th>
                <th>Capitán</th>
              </tr>

              </thead>

              <tbody>

              <tr th:each="equipoJugador : ${jugadoresEquipo}">

                <td>
                  <span th:text="${equipoJugador.jugador.nombre}"></span>
                  <span th:text="${equipoJugador.jugador.apellido}"></span>
                </td>

                <td th:text="${equipoJugador.posicion}">
                  DELANTERO
                </td>

                <td>

                                    <span th:if="${equipoJugador.capitan}"
                                          class="badge bg-success">
                                        Capitán
                                    </span>

                  <span th:unless="${equipoJugador.capitan}"
                        class="badge bg-secondary">
                                        Jugador
                                    </span>

                </td>

              </tr>

              </tbody>

            </table>

          </div>

        </div>

      </div>

      <!-- AGREGAR JUGADOR -->
      <div class="card border-0 shadow-lg rounded-4 card-custom">

        <div class="card-body p-5">

          <h3 class="titulo-verde mb-4 text-center">
            Agregar jugador al equipo
          </h3>

          <p class="text-secondary text-center mb-4">
            Buscá un jugador registrado y asignale una posición.
          </p>

          <form th:action="@{/equipo/agregar-jugador}"
                method="post">

            <input type="hidden"
                   name="equipoId"
                   th:value="${equipo.id}">

            <div class="mb-3">

              <label class="form-label">
                ID del jugador
              </label>

              <input type="number"
                     name="jugadorId"
                     class="form-control"
                     placeholder="Ej: 2"
                     required>

            </div>

            <div class="mb-4">

              <label class="form-label">
                Posición
              </label>

              <select name="posicion"
                      class="form-select"
                      required>

                <option value="">
                  Seleccione una posición
                </option>

                <option th:each="posicion : ${posiciones}"
                        th:value="${posicion}"
                        th:text="${posicion}">
                </option>

              </select>

            </div>

            <button type="submit"
                    class="btn w-100 fw-bold rounded-pill boton-verde">

              Agregar jugador

            </button>

          </form>

        </div>

      </div>

    </div>

  </div>

</main>

</body>
</html>
