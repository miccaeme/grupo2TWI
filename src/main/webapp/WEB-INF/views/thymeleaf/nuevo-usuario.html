<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Nuevo Usuario</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/css/main.css}" />

</head>

<body class="d-flex flex-column h-100 bg-dark text-light">

<!-- Header  -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center fw-bold text-uppercase" th:href="@{/login}" style="letter-spacing: 1px;">
                <span class="bg-success text-black px-2 py-1 rounded me-2 d-inline-block">
                    <i class="fas fa-shield-alt"></i>
                </span>
      <span class="text-white">Torneos</span><span class="text-success">Pro</span>
    </a>

    <button class="navbar-toggler border-secondary text-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>


    </div>
</nav>

<main role="main" class="flex-shrink-0">

  <!-- HERO CON EL REGISTRO INTEGRADO -->
  <section class="container py-5">
    <div class="row align-items-center min-vh-75">

      <!-- Columna Izquierda: Información de la plataforma -->
      <div class="col-lg-6">
          <span class="badge bg-success mb-3 px-3 py-2">
            Plataforma deportiva
          </span>
        <h1 class="display-3 fw-bold mb-4">
          Unite a la comunidad <br>
          <span class="text-success">TORNEOS PRO</span>
        </h1>
        <p class="lead text-secondary mb-4">
          Creá tu cuenta en segundos para empezar a organizar torneos, administrar tus equipos, gestionar jugadores y seguir los fixtures en tiempo real.
        </p>
      </div>

      <!-- Columna Derecha: El formulario de registro transformado -->
      <div class="col-lg-6 mt-5 mt-lg-0">
        <div class="card bg-dark border border-secondary shadow-lg rounded-4 p-4">

          <div class="mb-4">
            <h3 class="fw-bold text-success mb-1">Nuevo Usuario</h3>
            <p class="text-secondary small">Completá tus datos para registrarte</p>
          </div>

          <!-- Formulario Thymeleaf adaptado -->
          <form action="#" th:action="@{/registrarme}" method="POST" th:object="${usuario}" class="row g-3">

            <div class="col-md-6">
              <label for="nombre" class="form-label text-secondary small">Nombre</label>
              <input th:field="*{nombre}" id="nombre" class="form-control bg-black text-light border-secondary p-3 rounded-3" placeholder="Tu nombre" required />
            </div>

            <div class="col-md-6">
              <label for="apellido" class="form-label text-secondary small">Apellido</label>
              <input th:field="*{apellido}" id="apellido" class="form-control bg-black text-light border-secondary p-3 rounded-3" placeholder="Tu apellido" required />
            </div>

            <div class="col-12">
              <label for="email" class="form-label text-secondary small">Email</label>
              <input th:field="*{email}" type="email" id="email" class="form-control bg-black text-light border-secondary p-3 rounded-3" placeholder="nombre@ejemplo.com" required />
            </div>

            <div class="col-12 mb-2">
              <label for="password" class="form-label text-secondary small">Contraseña</label>
              <input th:field="*{password}" type="password" id="password" class="form-control bg-black text-light border-secondary p-3 rounded-3" placeholder="••••••••" required />
            </div>

            <div class="col-12">
              <button id="btn-registrarme" class="btn btn-success btn-lg rounded-pill w-100 fw-bold py-3" type="submit">
                Registrarme
              </button>
            </div>

            <div class="col-12 text-center mt-3">
              <a th:href="@{/login}" class="text-secondary text-decoration-none small hover-success">
                Ya estoy registrado
              </a>
            </div>

            <!-- Alerta de error estilizada si falla el registro -->
            <div class="col-12" th:if="${error != null}">
              <div class="alert alert-danger bg-danger bg-opacity-10 text-danger border-danger mt-3 mb-0 rounded-3" role="alert">
                <strong>Error:</strong> <span th:text="${error}"></span>
              </div>
            </div>

          </form>

        </div>
      </div>

    </div>
  </section>

</main>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>

</html>
