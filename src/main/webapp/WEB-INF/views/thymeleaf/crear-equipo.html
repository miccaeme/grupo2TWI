<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crear equipo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .card-body {
            background-color: #121212 !important;
            border: 1px solid #2a2a2a !important;
        }
        .boton-verde {
            background-color: #198754 !important;
            color: #000000 !important;
            border: 2px solid #198754 !important;
            transition: all 0.2s ease-in-out !important;
            box-shadow: 0 4px 15px rgba(25, 135, 84, 0.3) !important;
        }

        .boton-verde:hover {
            background-color: #157347 !important;
            border-color: #157347 !important;
            color: #000000 !important;
            box-shadow: 0 4px 20px rgba(25, 135, 84, 0.5) !important;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/header :: header_fragment}"></div>


<main class="container py-5">
    <div class="row justify-content-center">

        <div class="col-md-7 col-lg-6">

            <div class="card border-0 shadow-lg rounded-4 card-custom">

                <div class="card-body p-5">

                    <h1 class="text-center titulo-verde mb-2">
                        Crear equipo
                    </h1>

                    <p class="text-center text-secondary mb-4">
                        Creá tu equipo y convertite automáticamente en capitán.
                    </p>

                    <div th:if="${mensaje}"
                         class="alert alert-success"
                         th:text="${mensaje}">
                    </div>

                    <form th:action="@{/equipo/crear}"
                          th:object="${equipo}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">
                                Nombre del equipo
                            </label>

                            <input type="text"
                                   th:field="*{nombre}"
                                   class="form-control"
                                   placeholder="Ej: Los Titanes"
                                   required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-bold">
                                Deporte del equipo
                            </label>

                            <select th:field="*{deporte}"
                                    id="deporte"
                                    class="form-select bg-dark text-white border-secondary"
                                    required>

                                <option value="">
                                    Seleccione un deporte
                                </option>

                                <option th:each="unDeporte : ${deportes}"
                                        th:value="${unDeporte}"
                                        th:text="${unDeporte.name() + ' (' + unDeporte.getSlots() + ' slots)'}">
                                </option>

                            </select>
                        </div>


                        <button type="submit"
                                class="btn w-100 fw-bold rounded-pill boton-verde">
                            Crear equipo
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</main>
<div th:replace="~{fragments/footer :: footer_fragment}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
