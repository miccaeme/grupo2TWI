<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crear equipo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/header :: header_fragment"></div>

<main class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-7 col-lg-6">

            <div class="card border-0 shadow-lg rounded-4 card-custom">

                <div class="card-body p-5">

                    <h1 class="text-center titulo-verde mb-2">
                        Crear equipo
                    </h1>

                    <p class="text-center text-secondary mb-4">
                        Creá tu equipo y convertite automáticamente en capitán.
                    </p>

                    <div th:if="${mensaje}"
                         class="alert alert-success"
                         th:text="${mensaje}">
                    </div>

                    <form th:action="@{/equipo/crear}"
                          th:object="${equipo}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">
                                Nombre del equipo
                            </label>

                            <input type="text"
                                   th:field="*{nombre}"
                                   class="form-control"
                                   placeholder="Ej: Los Titanes"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Deporte del equipo
                            </label>

                            <select th:field="*{deporte}"
                                    id="deporte"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Seleccione un deporte
                                </option>

                                <option th:each="deporte : ${deportes}"
                                        th:value="${deporte}"
                                        th:text="${deporte}">
                                </option>

                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                ID del jugador capitán
                            </label>

                            <input type="number"
                                   name="jugadorId"
                                   class="form-control"
                                   placeholder="Ej: 1"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Tu posición en este equipo
                            </label>

                            <select name="posicion"
                                    id="posicion"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Seleccione una posición
                                </option>

                                <option th:each="posicion : ${posiciones}"
                                        th:value="${posicion}"
                                        th:text="${posicion}">
                                </option>

                            </select>
                        </div>

                        <button type="submit"
                                class="btn w-100 fw-bold rounded-pill boton-verde">
                            Crear equipo
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</main>
<script th:src="@{/js/equipo.js}"></script>
</body>
</html>
